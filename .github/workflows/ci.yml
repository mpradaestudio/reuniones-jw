name: CI

# Ejecutar en cada push y en cada pull request hacia cualquier rama.
on:
  push:
  pull_request:

jobs:
  test:
    name: PHP 8.3 — Tests + Pint
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------ #
      # 1. Código fuente                                                     #
      # ------------------------------------------------------------------ #
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. PHP 8.3 con las extensiones requeridas por el proyecto           #
      #    - pdo_sqlite : base de datos en memoria para los tests           #
      #    - mbstring   : requerida por Laravel y Spatie Permission         #
      #    - xml        : requerida por PHPUnit                             #
      #    - ctype / tokenizer / curl / zip : core de Laravel               #
      # ------------------------------------------------------------------ #
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, sqlite3, mbstring, xml, ctype, tokenizer, curl, zip, bcmath
          coverage: none          # sin cobertura → más rápido

      # ------------------------------------------------------------------ #
      # 3. Caché de dependencias Composer                                   #
      #    La clave incluye el SO y el hash de composer.lock para           #
      #    invalidar automáticamente cuando cambien las dependencias.       #
      # ------------------------------------------------------------------ #
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # ------------------------------------------------------------------ #
      # 4. Instalar dependencias                                            #
      #    --no-interaction : sin preguntas interactivas                    #
      #    --prefer-dist    : descarga zips en lugar de clonar git          #
      #    --optimize-autoloader : genera classmap optimizado               #
      # ------------------------------------------------------------------ #
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # ------------------------------------------------------------------ #
      # 5. Preparar entorno de Laravel                                      #
      #    .env de CI: sobreescribe solo los valores que difieren de        #
      #    .env.example; el resto lo inyecta phpunit.xml (DB, cache, etc.)  #
      # ------------------------------------------------------------------ #
      - name: Prepare .env
        run: |
          cp .env.example .env
          # La clave se genera en el siguiente paso; el resto de variables
          # de entorno críticas para los tests (DB_CONNECTION=sqlite,
          # DB_DATABASE=:memory:, SESSION_DRIVER=array, CACHE_STORE=array,
          # QUEUE_CONNECTION=sync) ya están definidas en phpunit.xml y no
          # necesitan sobreescribirse aquí.

      - name: Generate APP_KEY
        run: php artisan key:generate --ansi

      # ------------------------------------------------------------------ #
      # 6. Suite de tests                                                   #
      #    phpunit.xml establece DB_CONNECTION=sqlite + DB_DATABASE=:memory:#
      #    Los tests usan RefreshDatabase, que ejecuta las migraciones      #
      #    automáticamente en cada test dentro de su propia conexión.       #
      #    No se necesita un paso de migrate previo: la base en memoria     #
      #    es efímera y se recrea por test/clase.                           #
      # ------------------------------------------------------------------ #
      - name: Run tests
        run: php artisan test --ansi

      # ------------------------------------------------------------------ #
      # 7. Estilo de código con Pint                                        #
      #    --test: solo valida, no sobreescribe nada. Falla si hay         #
      #    archivos que no cumplen el estilo.                               #
      # ------------------------------------------------------------------ #
      - name: Check code style (Pint)
        run: vendor/bin/pint --test --ansi
