<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar sesión · Reuniones JW</title>

    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex&display=swap" rel="stylesheet">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="http://reuniones-jw.local/css/app.css">
    </head>
<body>
    <div class="rjw-auth-wrapper">
            <div class="w-100" style="max-width: 26rem;">
        <div class="text-center mb-4 text-white">
            <h1 class="h3 fw-semibold mb-1">Reuniones JW</h1>
            <p class="text-white-50 mb-2">Gestión de congregaciones</p>
                    </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-sm-5">
                <h2 class="h5 fw-semibold mb-4">Iniciar sesión</h2>

                
                <form method="POST" action="http://reuniones-jw.local/login">
                    <input type="hidden" name="_token" value="md1aC2KHQVY8aJbXIqF3NTufpZHmFzpbpucCxMJD" autocomplete="off">
                    <div class="mb-3">
                        <label for="email" class="form-label">Correo electrónico</label>
                        <input id="email" name="email" type="email" value=""
                               class="form-control" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input id="password" name="password" type="password" class="form-control" required>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" name="remember" id="remember">
                        <label class="form-check-label" for="remember">Recordarme</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>
                </form>
            </div>
        </div>

        <p class="text-center text-white-50 small mt-4 mb-0">&copy; 2026 Reuniones JW</p>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
